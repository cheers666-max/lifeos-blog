{{- /* ── 排版升级：Swiss Modernism + Developer Mono 字体栈 ── */ -}}

{{- /* Google Fonts：IBM Plex Sans（标题/正文） + JetBrains Mono（代码） + Noto Sans SC（中文回退） */ -}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ── 流式自适应布局 ── */
:root {
  --main-width: min(94vw, 1550px);
  --content-gap: 24px;
  --gap: clamp(20px, 3vw, 40px);
  --radius: 6px;
}
@media screen and (min-width: 1800px) {
  :root { --main-width: 1600px; }
}
@media screen and (max-width: 768px) {
  :root { --main-width: 100%; }
}

/* ── 全局字体栈 ── */
body {
  font-family: 'IBM Plex Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont,
    'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── 代码字体 ── */
code, pre, kbd, samp {
  font-family: 'JetBrains Mono', 'Noto Sans SC', 'SF Mono', 'Fira Code',
    'Cascadia Code', Consolas, monospace !important;
}
</style>

{{- /* 数学渲染：页面 front-matter 设 math: true 时加载 KaTeX */ -}}
{{- if .Param "math" }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"
  onload="renderMathInElement(document.body, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$', right: '$', display: false},
      {left: '\\[', right: '\\]', display: true},
      {left: '\\(', right: '\\)', display: false}
    ],
    throwOnError: false
  });"></script>
{{- end }}
